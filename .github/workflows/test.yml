name: Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run go vet
        run: go vet ./...

      - name: Check formatting
        run: |
          gofmt -l .
          test -z "$(gofmt -l .)" || (echo "Run 'make fmt'" && exit 1)

      - name: Run golangci-lint
        run: go tool golangci-lint run ./...

      - name: Validate documentation
        run: go tool tfplugindocs validate

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [checks]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run unit tests
        run: go test -race ./...

  acceptance:
    name: Acceptance Tests (PostgreSQL ${{ matrix.postgres_version }})
    runs-on: ubuntu-latest
    needs: [unit]
    strategy:
      fail-fast: false
      matrix:
        postgres_version: ["14", "15", "16", "17"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Run acceptance tests
        env:
          TF_ACC: "1"
          POSTGRES_IMAGE: "postgres:${{ matrix.postgres_version }}-alpine"
        run: go test -tags integration -timeout 600s -coverprofile=coverage.out ./...

      - name: Print coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Upload coverage to Codecov
        if: matrix.postgres_version == '17'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          flags: acceptance
          fail_ci_if_error: false
