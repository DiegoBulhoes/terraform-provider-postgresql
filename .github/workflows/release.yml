name: Release
run-name: "Release - terraform-provider-postgresql ${{ github.event.inputs.tag || github.ref_name }}"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag para release (ex: v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run go vet
        run: go vet ./...

      - name: Check formatting
        run: |
          gofmt -l .
          test -z "$(gofmt -l .)" || (echo "Run 'make fmt'" && exit 1)

      - name: Run golangci-lint
        run: go tool golangci-lint run ./...

      - name: Validate documentation
        run: go tool tfplugindocs validate

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [checks]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run unit tests
        run: go test -race -coverpkg=./internal/... ./test/unit/...

  acceptance:
    name: Acceptance Tests (PostgreSQL ${{ matrix.postgres_version }})
    runs-on: ubuntu-latest
    needs: [unit]
    strategy:
      fail-fast: false
      matrix:
        postgres_version: ["14", "15", "16", "17"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Run acceptance tests
        env:
          TF_ACC: "1"
          POSTGRES_IMAGE: "postgres:${{ matrix.postgres_version }}-alpine"
        run: go test -tags integration -timeout 600s -coverpkg=./internal/... ./...

  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    needs: [acceptance]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create tag
        if: github.event_name == 'workflow_dispatch'
        run: git tag ${{ github.event.inputs.tag }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          echo "${{ secrets.GPG_PASSPHRASE }}" | gpg --batch --yes --passphrase-fd 0 --pinentry-mode loopback -s /dev/null 2>/dev/null || true

      - name: Get GPG fingerprint
        id: gpg
        run: echo "fingerprint=$(gpg --list-secret-keys --keyid-format long | grep sec | awk '{print $2}' | cut -d'/' -f2)" >> "$GITHUB_OUTPUT"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.gpg.outputs.fingerprint }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
